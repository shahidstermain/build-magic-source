<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d7a85" />

    <!-- Primary meta -->
    <title>AndamanBazaar — Buy, Sell &amp; Discover Across the Islands</title>
    <meta name="description" content="AndamanBazaar is the hyperlocal marketplace for the Andaman &amp; Nicobar Islands. Buy, sell, and discover local experiences across Port Blair, Havelock, Neil, Diglipur and beyond. Boat pe bharosa." />
    <meta name="keywords" content="Andaman marketplace, buy sell Andaman, Andaman Islands, Port Blair, Havelock, Neil Island, Andaman experiences, water sports Andaman, AI trip planner Andaman" />
    <meta name="author" content="AndamanBazaar" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://andamanbazaar.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AndamanBazaar" />
    <meta property="og:title" content="AndamanBazaar — Buy, Sell &amp; Discover Across the Islands" />
    <meta property="og:description" content="The hyperlocal marketplace for the Andaman &amp; Nicobar Islands. Buy, sell, and discover local experiences across Port Blair, Havelock, Neil and beyond." />
    <meta property="og:url" content="https://andamanbazaar.in/" />
    <meta property="og:image" content="https://andamanbazaar.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AndamanBazaar — Island marketplace" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@andamanbazaar" />
    <meta name="twitter:creator" content="@andamanbazaar" />
    <meta name="twitter:title" content="AndamanBazaar — Buy, Sell &amp; Discover Across the Islands" />
    <meta name="twitter:description" content="The hyperlocal marketplace for the Andaman &amp; Nicobar Islands. Buy, sell, and discover local experiences." />
    <meta name="twitter:image" content="https://andamanbazaar.in/og-image.png" />

    <!-- Geo tags -->
    <meta name="geo.region" content="IN-AN" />
    <meta name="geo.placename" content="Port Blair, Andaman and Nicobar Islands" />
    <meta name="geo.position" content="11.6234;92.7265" />
    <meta name="ICBM" content="11.6234, 92.7265" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- JSON-LD: LocalBusiness + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://andamanbazaar.in/#website",
          "url": "https://andamanbazaar.in/",
          "name": "AndamanBazaar",
          "description": "The hyperlocal marketplace for the Andaman & Nicobar Islands",
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://andamanbazaar.in/listings?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://andamanbazaar.in/#business",
          "name": "AndamanBazaar",
          "description": "Hyperlocal buy-sell marketplace and experience booking platform for the Andaman & Nicobar Islands",
          "url": "https://andamanbazaar.in/",
          "logo": "https://andamanbazaar.in/favicon.png",
          "image": "https://andamanbazaar.in/og-image.png",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Port Blair",
            "addressRegion": "Andaman and Nicobar Islands",
            "postalCode": "744101",
            "addressCountry": "IN"
          },
          "geo": {
            "@type": "GeoCoordinates",
            "latitude": 11.6234,
            "longitude": 92.7265
          },
          "areaServed": {
            "@type": "Place",
            "name": "Andaman and Nicobar Islands"
          },
          "sameAs": [
            "https://instagram.com/andamanbazaar",
            "https://facebook.com/andamanbazaar",
            "https://twitter.com/andamanbazaar"
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
